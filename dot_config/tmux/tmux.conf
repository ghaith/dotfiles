# ─── Prefix ──────────────────────────────────────────────────────────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix          # C-a C-a → send literal C-a (nested tmux / shell)

# ─── Terminal & Mouse ────────────────────────────────────────────────────────
set -g mouse on
set -g escape-time 10             # faster ESC in vim
set -g extended-keys on
if-shell '[ "$(tmux -V | cut -d" " -f2 | tr -d "a-z-" | awk "{print ($1 >= 3.5)}")" = "1" ]' \
    'set -g extended-keys-format csi-u'
set -g focus-events on
set-option -g status-keys emacs
set-option -g allow-rename off
set-option -g allow-passthrough on

# Clipboard: tmux propagates copy buffer to terminal via OSC 52.
# yank.sh also sends directly for local sessions (more reliable).
set-option -g set-clipboard on
set -as terminal-features 'xterm*:clipboard'
set -as terminal-features 'tmux*:clipboard'

# ─── Panes ───────────────────────────────────────────────────────────────────
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
unbind '"'
unbind %

# Navigate panes — Alt+hjkl (no prefix needed)
# j=down, k=up matches vim convention
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-j select-pane -D
bind -n M-k select-pane -U

# Resize panes — prefix + HJKL (repeatable)
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5

# Zoom current pane (toggle)
bind z resize-pane -Z

# Kill with confirmation — x = pane, X = whole window (useful for hung processes)
bind x confirm-before -p "kill pane? (y/n)" kill-pane
bind X confirm-before -p "kill window #W? (y/n)" kill-window

# ─── Windows ─────────────────────────────────────────────────────────────────
bind c new-window -c '#{pane_current_path}'
bind n next-window
bind p previous-window
bind b break-pane -d
bind , command-prompt -I "#{window_name}" "rename-window '%%'"
bind '$' command-prompt -I "#{session_name}" "rename-session '%%'"

# ─── Layouts ─────────────────────────────────────────────────────────────────
bind -r Space next-layout         # cycle through: even-h, even-v, main-h, main-v, tiled
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

# ─── Copy mode (vi) ──────────────────────────────────────────────────────────
setw -g mode-keys vi
bind [ copy-mode
bind ] paste-buffer

unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v     send-keys -X begin-selection
bind-key -T copy-mode-vi V     send-keys -X select-line
bind-key -T copy-mode-vi C-v   send-keys -X rectangle-toggle

# All copy paths go through yank.sh for consistent clipboard behaviour
bind-key -T copy-mode-vi y \
    send-keys -X copy-pipe-and-cancel "~/.config/tmux/yank.sh"
bind-key -T copy-mode-vi Enter \
    send-keys -X copy-pipe-and-cancel "~/.config/tmux/yank.sh"
bind-key -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-pipe-and-cancel "~/.config/tmux/yank.sh"

# ─── Session ─────────────────────────────────────────────────────────────────
bind d detach-client
bind r source-file ~/.config/tmux/tmux.conf \; display "  config reloaded"

# ─── Which-key popup (prefix + Tab) ──────────────────────────────────────────
# Shows a menu of all key bindings. Press the key shown to execute immediately.
# Arrow keys / Enter also work. Escape to cancel.
bind Tab display-menu -T "  tmux keys " -x C -y C \
    "Panes" "" "" \
    "  Split Right            |" "|" "split-window -h -c '#{pane_current_path}'" \
    "  Split Down             -" "-" "split-window -v -c '#{pane_current_path}'" \
    "  Zoom Toggle            z" "z" "resize-pane -Z" \
    "  Kill Pane              x" "x" "confirm-before -p 'kill pane? (y/n)' kill-pane" \
    "  Kill Window            X" "X" "confirm-before -p 'kill window? (y/n)' kill-window" \
    "  Navigate         Alt+h/j/k/l" "" "" \
    "  Resize           H / J / K / L" "" "" \
    "" \
    "Windows" "" "" \
    "  New Window             c" "c" "new-window -c '#{pane_current_path}'" \
    "  Next Window            n" "n" "next-window" \
    "  Prev Window            p" "p" "previous-window" \
    "  Break to Window        b" "b" "break-pane -d" \
    "  Rename Window          ," "," "command-prompt -I '#{window_name}' 'rename-window %%'" \
    "  Rename Session         \$" "\$" "command-prompt -I '#{session_name}' 'rename-session %%'" \
    "" \
    "Copy Mode" "" "" \
    "  Enter Copy Mode        [" "[" "copy-mode" \
    "  Paste                  ]" "]" "paste-buffer" \
    "  (in copy: v=select  V=line  C-v=rect  y/Enter=copy)" "" "" \
    "" \
    "Layouts" "" "" \
    "  Cycle Layouts      Space" " " "next-layout" \
    "  Even Horizontal    M-1" "" "" \
    "  Even Vertical      M-2" "" "" \
    "  Main Horizontal    M-3" "" "" \
    "  Main Vertical      M-4" "" "" \
    "" \
    "Session" "" "" \
    "  Detach                 d" "d" "detach-client" \
    "  Reload Config          r" "r" "source-file ~/.config/tmux/tmux.conf \; display '  config reloaded'"

# ─── Theme (catppuccin — must be last) ───────────────────────────────────────
set -g @catppuccin_flavor "mocha"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
